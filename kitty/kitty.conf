# vim:ft=kitty

## --- FONTS ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0
text_composition_strategy legacy

## --- WINDOW LAYOUT ---
window_padding_width 15
hide_window_decorations no
confirm_os_window_close 0
linux_display_server wayland
# wayland_titlebar_color background

## --- OPACITY ---
# Note: Your Hyprland windowrule handles the actual blur
background_opacity 0.85
dynamic_background_opacity yes

## --- COLORS (Matches Waybar/Wlogout) ---
# background #11111b
# foreground #cdd6f4
# selection_background #bd93f9
# selection_foreground #11111b
# url_color #8be9fd
# cursor #8be9fd
# cursor_text_color #11111b

# Black
# color0 #45475a
# color8 #585b70
# Red
# color1 #f38ba8
# color9 #f38ba8
# Green
# color2  #50fa7b
# color10 #50fa7b
# Yellow
# color3  #f1fa8c
# color11 #f1fa8c
# Blue
# color4  #8caaee
# color12 #8caaee
# Magenta (Purple)
# color5  #bd93f9
# color13 #bd93f9
# Cyan
# color6  #8be9fd
# color14 #8be9fd
# White
# color7  #bac2de
# color15 #a6adc8


# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME